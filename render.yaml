# Render Blueprint — one-click deploy of the whole stack on a hobby-tier footprint (brief §2).
# In the Render dashboard: New → Blueprint → point at this repo. Then set the two secrets
# marked `sync: false` (GEMINI_API_KEY, and the frontend's VITE_API_BASE after the backend URL
# is known). See docs/deployment.md for the exact steps.

databases:
  - name: grocery-db
    plan: free
    databaseName: grocery
    user: grocery

services:
  # --- Backend: FastAPI (Docker, light image; stub detector, no heavy vision deps) ---
  - type: web
    name: grocery-backend
    runtime: docker
    plan: free
    dockerfilePath: ./docker/Dockerfile.backend
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: grocery-db
          property: connectionString
      - key: DETECTOR_PROVIDER
        value: stub
      - key: OCR_PROVIDER
        value: "null"
      - key: STT_PROVIDER
        value: "null"
      - key: SEED_PRODUCTS_CSV
        value: /app/data/seed/products.csv
      - key: JWT_SECRET
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false            # set in dashboard (optional; echo fallback works without it)
      - key: CORS_ORIGINS
        sync: false            # set to the frontend URL once known, e.g. https://grocery-frontend.onrender.com

  # --- Frontend: static site built by Vite ---
  - type: web
    name: grocery-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    envVars:
      - key: VITE_API_BASE
        sync: false            # set to the backend URL, e.g. https://grocery-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
